{% extends "shop/base.html" %}
{% load static %}

{% block content %}
<section class="section_padding">
    <div class="container">
        <div class="row">
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <h4 class="mb-3">Profile</h4>
                        <div class="d-grid gap-2">
                            <a href="{% url 'shop:user_orders' %}" class="btn_3 text-center w-100 mb-2" style="display: block;">
                                My orders
                            </a>

                            <a href="{% url 'shop:profile_settings' %}" class="btn_3 text-center w-100 mb-2" style="display: block;">
                                Settings
                            </a>

                            <form action="{% url 'logout' %}" method="post" class="w-100">
                                {% csrf_token %}
                                <button type="submit" class="btn_3 w-100">Logout</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-8">
                <h2>Hello, {{ user.username }}!</h2>
                <hr>
                <p><strong>Email:</strong> {{ user.email }}</p>
                <p><strong>Date of registration:</strong> {{ user.date_joined|date:"d M Y" }}</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
